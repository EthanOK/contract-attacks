[profile.default]
src = 'contracts/src'
out = 'out'
libs = ['node_modules', 'contracts/lib']
test = 'contracts/test'
script = 'contracts/script'
# Default: paris 
evm_version = 'cancun'

optimizer_runs = 200

solc_version = '0.8.20'

[rpc_endpoints]
sepolia = "https://rpc.ankr.com/eth_sepolia"
bsc = "${BSC_RPC_URL}"
